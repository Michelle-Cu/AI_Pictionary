<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host Console — AI Pictionary</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .gscore-block { display: flex; flex-direction: column; gap: .25rem; }
    .draft-thumbs { display: flex; gap: .2rem; flex-wrap: wrap; }
    .draft-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: .4rem; border: 2px solid #e2e8f0; cursor: zoom-in; transition: border-color .15s, transform .15s; }
    .draft-thumb:hover { border-color: #4f46e5; transform: scale(1.08); }

    /* Lightbox */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.75); align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox-inner {
      background: #fff; border-radius: 1rem; padding: 1rem;
      max-width: 520px; width: 90%; display: flex; flex-direction: column; gap: .75rem;
      position: relative;
    }
    #lightbox-img { width: 100%; border-radius: .6rem; object-fit: contain; max-height: 70vh; }
    #lightbox-label { font-size: .85rem; color: #64748b; text-align: center; }
    #lightbox-close {
      position: absolute; top: .6rem; right: .75rem;
      background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #64748b;
    }
    #lightbox-close:hover { color: #1e293b; }
  </style>
</head>
<body class="host-page">

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox(event)">
    <div id="lightbox-inner">
      <button id="lightbox-close" onclick="closeLightbox()">✕</button>
      <img id="lightbox-img" src="" alt="Preview">
      <div id="lightbox-label"></div>
    </div>
  </div>

  <h1>🎮 Host Console</h1>

  <div class="host-grid">
    <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
    <aside>
      <!-- Upload -->
      <div class="sidebar-card">
        <h2>Upload Question</h2>
        <form class="upload-form" id="upload-form" onsubmit="doUpload(event)">
          <input type="text" id="qid-input" placeholder="Question ID (e.g. Q1)" required>
          <input type="file" id="qfile-input" accept="image/*" required>
          <button type="submit" class="btn btn-primary btn-sm">Upload</button>
        </form>
        <div id="upload-status" style="font-size:.82rem;color:#059669;display:none">✓ Uploaded!</div>
      </div>

      <!-- Question list -->
      <div class="sidebar-card" style="margin-top:1rem">
        <h2>Questions</h2>
        <div class="question-list" id="question-list">
          <div style="color:#94a3b8;font-size:.85rem">No questions uploaded yet.</div>
        </div>
      </div>

      <!-- Group URLs -->
      <div class="sidebar-card" style="margin-top:1rem">
        <h2>Group URLs</h2>
        <div style="font-size:.78rem;color:#64748b;margin-bottom:.5rem">
          Replace <code>HOST</code> with this laptop's IP (e.g. 192.168.1.42).
        </div>
        <table class="url-table">
          <thead><tr><th>Group</th><th>URL</th></tr></thead>
          <tbody id="url-tbody"></tbody>
        </table>
      </div>
    </aside>

    <!-- ── Main ──────────────────────────────────────────────────────────────── -->
    <div class="main-area">
      <!-- Controls -->
      <div class="controls-bar">
        <div class="current-q" id="current-q-label">Active question: <strong id="current-q-val">none</strong></div>
        <button class="btn btn-primary" id="show-avg-btn" onclick="toggleAverage()">Show Average</button>
        <button class="btn btn-secondary" onclick="backToScoreboard()">↩ Scoreboard</button>
        <a href="/projector" target="_blank" class="btn btn-outline btn-sm">Open Projector ↗</a>
        <button class="btn btn-danger btn-sm" onclick="clearSubmissions()">🗑 Clear Submissions</button>
      </div>

      <!-- Stats grid -->
      <div class="stats-grid">
        <h2>Submissions</h2>
        <div id="stats-container">
          <div style="color:#94a3b8;font-size:.9rem;padding:.5rem 0">Load a question to see stats.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Group tokens injected from server
    const GROUP_TOKENS = {
      {% for (team, grp), token in group_tokens.items() %}
      "{{ team }}{{ grp }}": "{{ token }}",
      {% endfor %}
    };
    const TEAMS = {{ teams | tojson }};
    const GROUPS = {{ groups | tojson }};

    let activeQid = null;
    let showingAverage = false;

    // ── Build URL table ────────────────────────────────────────────────────────

    function buildURLTable() {
      const tbody = document.getElementById("url-tbody");
      const origin = window.location.origin.replace(window.location.hostname, "HOST");
      TEAMS.forEach(team => {
        GROUPS.forEach(g => {
          const token = GROUP_TOKENS[`${team}${g}`] || "";
          const url = `${origin}/team/${team}/group/${g}?token=${token}`;
          const tr = document.createElement("tr");
          tr.innerHTML = `<td><strong>Team ${team} G${g}</strong></td><td><code>${url}</code></td>`;
          tbody.appendChild(tr);
        });
      });
    }

    // ── Load questions ─────────────────────────────────────────────────────────

    async function loadQuestions() {
      const res = await fetch("/api/questions");
      const questions = await res.json();
      const gs = await (await fetch("/api/state")).json();
      activeQid = gs.current_question_id || null;
      showingAverage = gs.projector_show_average || false;
      updateAvgButton();

      const list = document.getElementById("question-list");
      if (questions.length === 0) {
        list.innerHTML = '<div style="color:#94a3b8;font-size:.85rem">No questions yet.</div>';
        return;
      }
      list.innerHTML = "";
      questions.forEach(q => {
        const div = document.createElement("div");
        div.className = "q-item" + (q.id === activeQid ? " active" : "");
        div.id = `qi-${q.id}`;
        div.innerHTML = `
          <span>${q.id}</span>
          <button class="btn btn-primary btn-sm" onclick="setQuestion('${q.id}')">Activate</button>
        `;
        list.appendChild(div);
      });

      if (activeQid) {
        document.getElementById("current-q-val").textContent = activeQid;
        loadStats();
      }
    }

    // ── Set active question ────────────────────────────────────────────────────

    async function setQuestion(qid) {
      if (!confirm(`Switch to question ${qid}? This will reset all group pages.`)) return;
      await fetch("/api/host/set-question", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question_id: qid }),
      });
      activeQid = qid;
      showingAverage = false;
      updateAvgButton();
      document.getElementById("current-q-val").textContent = qid;
      document.querySelectorAll(".q-item").forEach(el => el.classList.remove("active"));
      const el = document.getElementById(`qi-${qid}`);
      if (el) el.classList.add("active");
      loadStats();
    }

    // ── Upload ─────────────────────────────────────────────────────────────────

    async function doUpload(e) {
      e.preventDefault();
      const qid = document.getElementById("qid-input").value.trim();
      const file = document.getElementById("qfile-input").files[0];
      if (!qid || !file) return;

      const fd = new FormData();
      fd.append("question_id", qid);
      fd.append("file", file);

      const res = await fetch("/api/host/upload", { method: "POST", body: fd });
      if (res.ok) {
        document.getElementById("upload-status").style.display = "block";
        setTimeout(() => document.getElementById("upload-status").style.display = "none", 2000);
        document.getElementById("upload-form").reset();
        loadQuestions();
      } else {
        const d = await res.json();
        alert("Upload failed: " + (d.detail || "unknown error"));
      }
    }

    // ── Show average toggle ────────────────────────────────────────────────────

    function updateAvgButton() {
      const btn = document.getElementById("show-avg-btn");
      btn.textContent = showingAverage ? "Hide Average" : "Show Average";
      btn.className = showingAverage ? "btn btn-danger" : "btn btn-primary";
    }

    async function toggleAverage() {
      const newVal = !showingAverage;
      const res = await fetch("/api/host/show-average", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ show: newVal }),
      });
      if (res.ok) {
        showingAverage = newVal;
        updateAvgButton();
      }
    }

    // ── Back to scoreboard ─────────────────────────────────────────────────────

    async function backToScoreboard() {
      await fetch("/api/host/show-pics", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
      });
    }

    // ── Show pics for a group ─────────────────────────────────────────────────

    async function showPics(team, group) {
      await fetch("/api/host/show-pics", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ team, group_number: group }),
      });
    }

    // ── Stats ──────────────────────────────────────────────────────────────────

    async function loadStats() {
      const res = await fetch("/api/host/stats");
      const stats = await res.json();
      renderStats(stats);
    }

    function renderStats(stats) {
      const container = document.getElementById("stats-container");
      if (!stats.length) {
        container.innerHTML = '<div style="color:#94a3b8;font-size:.9rem">No submissions yet.</div>';
        return;
      }

      let html = `<table class="stats-table">
        <thead>
          <tr>
            <th style="width:90px">Question</th>
            <th></th>
            ${TEAMS.map(t => `<th>Team ${t}</th>`).join('')}
          </tr>
        </thead>
        <tbody>`;

      stats.forEach(q => {
        const isActive = q.question_id === activeQid;
        const rowClass = isActive ? "active-row" : "";

        GROUPS.forEach((g, gi) => {
          html += `<tr class="${rowClass}">`;

          // Question cell — only on first group row
          if (gi === 0) {
            html += `<td rowspan="${GROUPS.length}" style="vertical-align:top;text-align:center;padding-top:.6rem">
              <strong>${q.question_id}</strong><br>
              <img src="${q.image_url}" style="width:60px;height:60px;object-fit:cover;border-radius:.35rem;margin-top:.3rem;cursor:zoom-in"
                onclick="openLightbox('${q.image_url}', '${q.question_id} — Reference')">
            </td>`;
          }

          // Group label
          html += `<td style="font-weight:700;color:#475569;white-space:nowrap;padding-right:.25rem">G${g}</td>`;

          // One column per team
          TEAMS.forEach(team => {
            const td = q.teams[team];
            const gs = td.groups[String(g)];
            const draftList = (gs.drafts || []).map((draft, i) => {
              const isSubmitted = gs.submitted && draft.url === gs.image_url;
              const border = isSubmitted ? "border-color:#059669;border-width:3px" : "";
              const label = `Team ${team} · G${g} · Draft ${i+1}${isSubmitted ? ' (submitted)' : ''}`;
              const safeUrl = draft.url.replace(/"/g, '&quot;');
              const safeLabel = label.replace(/"/g, '&quot;');
              const safePrompt = (draft.prompt || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
              return `<div style="display:flex;flex-direction:column;align-items:flex-start;gap:.15rem;margin-bottom:.35rem">
                <img src="${safeUrl}" class="draft-thumb" style="${border}"
                  data-url="${safeUrl}" data-label="${safeLabel}" data-prompt="${safePrompt}"
                  onclick="openLightboxData(this)">
                ${draft.prompt ? `<span style="font-size:.72rem;color:#475569;line-height:1.3;word-break:break-word;max-width:80px">${safePrompt}</span>` : ''}
              </div>`;
            }).join('');

            if (gs.submitted) {
              html += `<td>
                <div class="gscore-block">
                  <span class="gscore submitted" onclick="showPics('${team}', ${g})" style="cursor:pointer">
                    ${gs.score}%
                  </span>
                  ${draftList ? `<div class="draft-thumbs" style="flex-direction:column;align-items:flex-start">${draftList}</div>` : ''}
                </div>
              </td>`;
            } else {
              html += `<td>
                <div class="gscore-block">
                  <span class="gscore">--</span>
                  ${draftList ? `<div class="draft-thumbs" style="flex-direction:column;align-items:flex-start">${draftList}</div>` : ''}
                </div>
              </td>`;
            }
          });

          html += `</tr>`;
        });

        // Summary row (avg per team)
        html += `<tr class="${rowClass}" style="border-top:2px solid #e2e8f0">
          <td></td><td style="font-size:.78rem;color:#94a3b8">avg</td>
          ${TEAMS.map(team => {
            const td = q.teams[team];
            return `<td style="font-size:.8rem;color:#64748b">
              ${td.count}/${GROUPS.length} submitted${td.avg !== null ? ` · <strong>${td.avg}%</strong>` : ''}
            </td>`;
          }).join('')}
        </tr>
        <tr><td colspan="${2 + TEAMS.length}" style="padding:0;height:8px"></td></tr>`;
      });

      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    // ── SSE (auto-refresh stats on new submissions) ────────────────────────────

    function connectSSE() {
      const es = new EventSource("/events");
      es.addEventListener("submission", () => { if (activeQid) loadStats(); });
      es.addEventListener("questions_updated", () => loadQuestions());
    }

    // ── Clear submissions ──────────────────────────────────────────────────────

    async function clearSubmissions() {
      if (!confirm("Clear ALL submissions? Questions and images stay. This cannot be undone.")) return;
      const res = await fetch("/api/host/clear-submissions", { method: "POST" });
      if (res.ok) {
        showingAverage = false;
        updateAvgButton();
        loadStats();
      }
    }

    // ── Lightbox ───────────────────────────────────────────────────────────────

    function openLightbox(url, label) {
      document.getElementById("lightbox-img").src = url;
      document.getElementById("lightbox-label").textContent = label || "";
      document.getElementById("lightbox").classList.add("open");
    }

    function openLightboxData(el) {
      const label = el.dataset.label || "";
      const prompt = el.dataset.prompt || "";
      openLightbox(el.dataset.url, prompt ? `${label} — "${prompt}"` : label);
    }

    function closeLightbox(e) {
      if (e && e.target !== document.getElementById("lightbox") && e.target !== document.getElementById("lightbox-close")) return;
      document.getElementById("lightbox").classList.remove("open");
    }

    document.addEventListener("keydown", e => { if (e.key === "Escape") document.getElementById("lightbox").classList.remove("open"); });

    // ── Init ──────────────────────────────────────────────────────────────────

    buildURLTable();
    loadQuestions();
    connectSSE();
  </script>
</body>
</html>
