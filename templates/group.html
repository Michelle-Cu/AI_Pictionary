<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team {{ team }} · Group {{ group_number }}</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .gen-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .gen-header h2 { margin-bottom: 0; }
    .version-btns { display: flex; gap: .4rem; }
    .vbtn {
      width: 52px; height: 36px;
      border-radius: .4rem;
      border: 2px solid #cbd5e1;
      background: #e2e8f0;
      color: #94a3b8;
      font-weight: 700; font-size: .9rem;
      cursor: not-allowed;
      transition: background .2s, border-color .2s, color .2s;
    }
    .vbtn.ready { background: #16a34a; border-color: #15803d; color: #fff; cursor: pointer; }
    .vbtn.ready:hover { background: #15803d; }
    .vbtn.selected { outline: 3px solid #4f46e5; outline-offset: 2px; }
  </style>
</head>
<body class="group-page">

  <header class="page-header">
    <h1>Team {{ team }} — Group {{ group_number }}</h1>
    <div class="question-badge" id="q-badge">Waiting…</div>
  </header>

  <main class="group-layout">
    <!-- Reference Image -->
    <section class="panel reference-panel">
      <h2>Reference Image</h2>
      <div class="img-frame">
        <img id="ref-img" alt="Reference image">
        <div class="placeholder" id="ref-ph">
          ⏳ Waiting for host to start a question…
        </div>
      </div>
    </section>

    <!-- Work Area -->
    <section class="panel work-panel">
      <div class="gen-header">
        <h2>Your Generated Image</h2>
        <div class="version-btns">
          <button class="vbtn" id="vbtn-1" onclick="selectVersion(1)">1</button>
          <button class="vbtn" id="vbtn-2" onclick="selectVersion(2)">2</button>
          <button class="vbtn" id="vbtn-3" onclick="selectVersion(3)">3</button>
        </div>
      </div>
      <div class="img-frame">
        <img id="gen-img" alt="Generated image">
        <div class="placeholder" id="gen-ph">Click <strong>Generate</strong> to see your image here</div>
        <div class="spinner" id="gen-spinner">
          <div class="spin-icon"></div>
          Generating with Gemini…
        </div>
      </div>

      <div>
        <h2>Your Prompt</h2>
        <textarea id="prompt-input"
          placeholder="Describe the image you want to recreate (subject + environment + style)…"
          rows="4"></textarea>
      </div>

      <div class="btn-row" id="btn-row">
        <button class="btn btn-secondary" id="generate-btn" onclick="doGenerate()">⚡ Generate</button>
        <button class="btn btn-success" id="submit-btn" onclick="doSubmit()">✓ Submit</button>
      </div>

      <div class="submit-banner" id="submit-banner" style="display:none">
        ✅ Submitted! Your score: <span class="score-big" id="score-val">--</span>
      </div>
    </section>
  </main>

  <script>
    const TEAM = "{{ team }}";
    const GROUP = {{ group_number }};
    const TOKEN = "{{ token }}";
    let drafts = [];        // [{version, image_url}, ...]
    let selectedVersion = null;

    // ── UI state helpers ───────────────────────────────────────────────────────

    function showRef(qid, imageUrl) {
      const img = document.getElementById("ref-img");
      img.src = `${imageUrl}?t=${Date.now()}`;
      img.style.display = "block";
      document.getElementById("ref-ph").style.display = "none";
      document.getElementById("q-badge").textContent = `Question: ${qid}`;
    }

    function clearRef() {
      document.getElementById("ref-img").style.display = "none";
      document.getElementById("ref-ph").style.display = "flex";
      document.getElementById("q-badge").textContent = "Waiting…";
    }

    function enableDrafting() {
      document.getElementById("generate-btn").disabled = drafts.length >= 3;
      document.getElementById("submit-btn").disabled = false;
      document.getElementById("prompt-input").disabled = false;
      document.getElementById("btn-row").style.display = "flex";
      document.getElementById("submit-banner").style.display = "none";
    }

    function setGenerating() {
      document.getElementById("generate-btn").disabled = true;
      document.getElementById("submit-btn").disabled = true;
      document.getElementById("gen-spinner").style.display = "flex";
      document.getElementById("gen-img").style.display = "none";
      document.getElementById("gen-ph").style.display = "none";
    }

    function showGenImage(url) {
      const img = document.getElementById("gen-img");
      img.src = url + "?t=" + Date.now();
      img.style.display = "block";
      document.getElementById("gen-spinner").style.display = "none";
      document.getElementById("gen-ph").style.display = "none";
    }

    function updateVersionButtons() {
      for (let v = 1; v <= 3; v++) {
        const btn = document.getElementById(`vbtn-${v}`);
        const hasDraft = drafts.some(d => d.version === v);
        btn.classList.toggle("ready", hasDraft);
        btn.classList.toggle("selected", v === selectedVersion);
        btn.disabled = !hasDraft;
      }
    }

    function selectVersion(v) {
      const draft = drafts.find(d => d.version === v);
      if (!draft) return;
      selectedVersion = v;
      showGenImage(draft.image_url);
      updateVersionButtons();
    }

    function onDraftAdded(version, imageUrl, prompt) {
      const existing = drafts.find(d => d.version === version);
      if (existing) {
        existing.image_url = imageUrl;
        if (prompt !== undefined) existing.prompt = prompt;
      } else {
        drafts.push({ version, image_url: imageUrl, prompt: prompt || "" });
      }
      selectedVersion = version;
      showGenImage(imageUrl);
      updateVersionButtons();
    }

    function showSubmitted(score, imgUrl, prompt) {
      if (prompt) document.getElementById("prompt-input").value = prompt;
      if (imgUrl) showGenImage(imgUrl);
      updateVersionButtons();
      document.getElementById("generate-btn").disabled = true;
      document.getElementById("submit-btn").disabled = true;
      document.getElementById("prompt-input").disabled = true;
      document.getElementById("btn-row").style.display = "none";
      document.getElementById("score-val").textContent = Math.round(score) + "%";
      document.getElementById("submit-banner").style.display = "block";
    }

    function resetForNewQuestion(qid, imageUrl) {
      drafts = [];
      selectedVersion = null;
      document.getElementById("prompt-input").value = "";
      document.getElementById("gen-img").style.display = "none";
      document.getElementById("gen-ph").style.display = "flex";
      document.getElementById("gen-spinner").style.display = "none";
      document.getElementById("submit-banner").style.display = "none";
      updateVersionButtons();
      showRef(qid, imageUrl);
      enableDrafting();
    }

    // ── Load page state ────────────────────────────────────────────────────────

    async function loadState() {
      const res = await fetch(`/api/group-state/${TEAM}/${GROUP}`);
      const data = await res.json();
      const gs = data.game_state;

      if (!gs || !gs.current_question_id) {
        clearRef();
        document.getElementById("btn-row").style.display = "none";
        document.getElementById("prompt-input").disabled = true;
        return;
      }

      showRef(gs.current_question_id, data.question.image_url);

      drafts = (data.drafts || []).map(d => ({ version: d.version, image_url: d.image_url, prompt: d.prompt || "" }));
      if (drafts.length > 0) {
        selectedVersion = drafts[drafts.length - 1].version;
      }
      updateVersionButtons();

      if (data.submission) {
        showSubmitted(data.submission.score, data.submission.image_url, data.submission.prompt);
      } else {
        if (selectedVersion) showGenImage(drafts.find(d => d.version === selectedVersion).image_url);
        enableDrafting();
      }
    }

    // ── Actions ────────────────────────────────────────────────────────────────

    async function doGenerate() {
      const prompt = document.getElementById("prompt-input").value.trim();
      if (!prompt) { alert("Please enter a prompt first."); return; }
      setGenerating();
      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ team: TEAM, group_number: GROUP, prompt, token: TOKEN }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Generation failed");
        onDraftAdded(data.version, data.image_url, prompt);
        enableDrafting();
      } catch (err) {
        alert("Error: " + err.message);
        document.getElementById("gen-spinner").style.display = "none";
        document.getElementById("gen-ph").style.display = "flex";
        enableDrafting();
      }
    }

    async function doUpload(input) {
      const file = input.files[0];
      if (!file) return;
      input.value = "";
      setGenerating();
      try {
        const form = new FormData();
        form.append("team", TEAM);
        form.append("group_number", GROUP);
        form.append("token", TOKEN);
        form.append("file", file);
        const res = await fetch("/api/upload-image", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Upload failed");
        onDraftAdded(data.version, data.image_url);
        enableDrafting();
      } catch (err) {
        alert("Error: " + err.message);
        document.getElementById("gen-spinner").style.display = "none";
        document.getElementById("gen-ph").style.display = "flex";
        enableDrafting();
      }
    }

    async function doSubmit() {
      if (!selectedVersion) {
        alert("Please generate an image first.");
        return;
      }
      if (!confirm("Submit this image? You can only submit once per question.")) return;

      const selectedDraft = drafts.find(d => d.version === selectedVersion);
      const prompt = selectedDraft?.prompt || document.getElementById("prompt-input").value.trim();
      document.getElementById("submit-btn").disabled = true;
      try {
        const res = await fetch("/api/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ team: TEAM, group_number: GROUP, prompt, token: TOKEN, version: selectedVersion }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Submit failed");
        showSubmitted(data.score, null, prompt);
      } catch (err) {
        alert("Error: " + err.message);
        document.getElementById("submit-btn").disabled = false;
      }
    }

    // ── SSE ────────────────────────────────────────────────────────────────────

    function connectSSE() {
      const es = new EventSource("/events");
      es.addEventListener("question_changed", (e) => {
        const data = JSON.parse(e.data);
        resetForNewQuestion(data.question_id, data.image_url);
      });
      es.onerror = () => {
        // Reconnect handled automatically by browser EventSource
      };
    }

    loadState();
    connectSSE();
  </script>
</body>
</html>
